version: '3.8'

services:
  editor:
    image: swaggerapi/swagger-editor
    container_name: "swagger-editor-container"
    ports:
      - "5000:8080"

  ui:
    image: swaggerapi/swagger-ui
    container_name: "swagger-ui-container"
    ports:
      - "5001:8080"
    volumes:
      - ./warmHouse.yml:/warmHouse.yml
    environment:
      SWAGGER_JSON: /warmHouse.yml